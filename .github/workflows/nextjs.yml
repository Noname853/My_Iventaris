name: Next.js CI

on:
  push:
    branches:
      - main
      - master
      - 'claude/**'
    paths:
      - 'next-app/**'
  pull_request:
    paths:
      - 'next-app/**'

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-latest
    name: Build & Type Check

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: next-app/package-lock.json

      - name: Install dependencies
        working-directory: next-app
        run: npm ci

      - name: Type check
        working-directory: next-app
        run: npx tsc --noEmit

      - name: Build
        working-directory: next-app
        run: npm run build
        env:
          DATABASE_URL: file:./prisma/dev.db
          AUTH_SECRET: ci-secret-key-for-build-only
          NEXTAUTH_URL: http://localhost:3000
